name: Deploy

on:
    workflow_run:
        workflows: ["CI"]
        types: [completed]
        branches: [main]

jobs:
    deploy-production:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest

        steps:
            - name: Trigger Vercel production deploy hook
              run: |
                  http_code=$(curl -sS -o response.json -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK_URL")
                  echo "Vercel deploy hook HTTP status: $http_code"
                  cat response.json

                  if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
                      echo "Deploy hook request failed"
                      exit 1
                  fi
              env:
                  VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
